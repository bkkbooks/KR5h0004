國鎮天星普願諸衆生悉皈依同會樂升平皈命妙法經法顯闡天神普願世間靈悉皈依同會結良因皈命道德經道中興理深普願念誦人悉皈依同會步玉京人人得長壽箇箇樂升平願滅諸煩惱消除永不生稽首皈依道同此結良因共生極樂國龍華三會人志心信禮太清師寶尊永壽年太極宮觀見世諸衆生無上尊一切墮地獄入邪宗生畜獸失人身賴師慈為提携大聖善通靈化萬民修功果懴滅多衆生無上尊萬福自來臻若皈依孔雀經真教主意業罪消除稽首皈依無極大道為上良因志心稱念消除災障天尊不可思議功德奏樂化財回示舉念伏以道在聖傳修在于巳凡有所為皆從心起懇禱虔誠一切信禮向來壇中演念聖母孔雀尊經幾部敬伸回向三清上聖玉帝至尊聖父聖母三寶三界孔雀明王之主宰淨泓法界之高真前傅後教之祖師談經演法之天人南辰壯極之星斗東西中斗度星官二十八宿十二之宫神普王河漢之羣真直年太歲之本命流年叨直之元辰五嶽四瀆之聖帝四海九江之龍神羅義龍女之魔耶天王玉女之龍君家祀香火之土地司命土禁之龍神城隍里社之祀典當境泰山之廟神瘟司行化之火部地盤業主之眀神祭係有感之英烈𡨚家債主之禍神結願𡨚仇之鬼衆身中作亂之禍神是日在會之真仙道場應感之證盟紏察護道天神衆殄妖滅怪衆雷兵經筵侍聞諸天聖一切神仙護教主仗此經功普伸芹奉請恩専為某削除罪愆增崇壽算伏願經力流恩帝心廣布好生有感之誠民心無不之願家邦常享于世域是非人我以和諧凡在有情均霑聖澤稽首皈依無極大道志心稱念孔雀明王大天尊衆和不可思議功德詳夫此經原所處在武當大嶽太和紫霄官李提點于捨身崖洞裏尋得度人經一部計八十五卷後載此道門孔雀經一部三卷取出洞門歸宫觀之此乃道釋兩門之化也凡夫不信吾乃收貯在官不覺經中自薀不可隱匿以此可傳于世今將古本抄籙散施十方道士能識音談演念者福有千錙上君王下資三宥固秦民安風調雨順人人樂業處處和平者大明萬曆三十五年歲次丁未上元吉日正一嗣教凝誠至道闡玄弘教大真人掌天下道教事張國祥奉旨校梓聖母孔雀明王尊經
